{% extends 'system.html' %}
{% load crispy_forms_tags %}

{% block title %}PAWCon Apply Admin - Merchant Tables{% endblock %}

{% block tool %}
<h1>Edit Merchant Table</h1>
<div class="col-md-3">
    <form class="form" action="{% url 'system:tables-edit' table.key %}" method="post">
        {% crispy form %}
        <input type="submit" value="Save" class="btn btn-primary">
        <a class="btn btn-danger" href="{% url 'system:tables-delete' table.key %}">Delete</a>
    </form>
</div>
{% endblock %}
