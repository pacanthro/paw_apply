{% extends 'system.html' %}
{% load crispy_forms_tags %}

{% block title %}PAWCon Apply Admin - Scheduling Config{% endblock %}

{% block tool %}
<h1>Edit {{sched_config.day_available.name}}'s Configuration</h1>
<div class="col-md-3">
    <form class="form" action="{% url 'system:schedconfig-edit' sched_config.id %}" method="post">
        {% crispy form %}
        <input type="submit" value="Save" class="btn btn-primary">
        <a class="btn btn-danger" href="{% url 'system:schedconfig-delete' sched_config.id %}">Delete</a>
    </form>
</div>
{% endblock %}
