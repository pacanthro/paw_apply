{% extends 'system.html' %}
{% load crispy_forms_tags %}

{% block title %}PAWCon Apply Admin - Days Available{% endblock %}

{% block tool %}
<h1>Edit Day Available</h1>
<div class="col-md-3">
    <form class="form" action="{% url 'system:days-edit' day_available.key %}" method="post">
        {% crispy form %}
        <input type="submit" value="Save" class="btn btn-primary">
        <a class="btn btn-danger" href="{% url 'system:days-delete' day_available.key %}">Delete</a>
    </form>
</div>
{% endblock %}
