{% extends 'system.html' %}
{% load crispy_forms_tags %}

{% block title %}PAWCon Apply Admin - Departments{% endblock %}

{% block tool %}
<h1>Edit Department</h1>
<div class="col-md-3">
    <form class="form" action="{% url 'system:department-edit' department.id %}" method="post">
        {% crispy form %}
        <input type="submit" value="Save" class="btn btn-primary">
        <a class="btn btn-danger" href="{% url 'system:department-delete' department.id %}">Delete</a>
    </form>
</div>
{% endblock %}
